{% extends 'base.html' %}
{% block content %}

<section class="max-w-7xl mx-auto px-6 py-12 md:py-20">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-start">
        
        <div class="space-y-6">
            <div class="bg-stone-100 overflow-hidden">
                <img src="/static/images/{{ product_id }}.png" alt="{{ product.name }} - Burning" class="w-full h-auto object-cover max-h-[600px]">
            </div>
            
            <div class="bg-stone-100 overflow-hidden">
                <img src="/static/images/{{ product_id }}2.png" alt="{{ product.name }} - Closed" class="w-full h-auto object-cover max-h-[450px]">
            </div>
        </div>

        <div class="flex flex-col md:sticky md:top-28">
            <div class="border-b border-stone-200 pb-6 mb-6">
                <p class="text-xs text-stone-500 uppercase tracking-widest mb-1">20 Reviews</p>
                <h1 class="serif text-3xl font-medium tracking-wide uppercase mb-2">{{ product.name }}</h1>
                <p class="text-xl font-medium text-stone-800">${{ "%.2f"|format(product.price) }}</p>
            </div>

            <div class="mb-8">
                <h3 class="text-xs font-semibold uppercase tracking-widest text-stone-400 mb-2">Description</h3>
                <p class="text-stone-600 font-light leading-relaxed text-sm mb-6">
                    {{ product.description }}
                </p>
                
                <div class="bg-[#F6F3EE] p-4 border border-stone-200 text-xs tracking-wide">
                    <span class="font-semibold uppercase text-stone-700">Brings Out:</span> 
                    <span class="text-stone-600 italic ml-1">{{ product.brings_out }}</span>
                </div>
            </div>

            <form action="#" method="POST" class="mb-10">
                <div class="flex items-center space-x-4 mb-4">
                    <label class="text-xs uppercase tracking-widest font-semibold text-stone-500">QTY:</label>
                    <div class="flex border border-stone-300 bg-white">
                        <button type="button" class="px-3 py-1 text-stone-500 hover:bg-stone-100 transition focus:outline-none">-</button>
                        <input type="text" name="quantity" value="1" class="w-12 text-center text-sm focus:outline-none border-x border-stone-200 font-medium" readonly>
                        <button type="button" class="px-3 py-1 text-stone-500 hover:bg-stone-100 transition focus:outline-none">+</button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-stone-900 text-white text-xs tracking-widest uppercase font-medium py-4 hover:bg-stone-800 transition duration-300">
                    Add to Cart
                </button>
            </form>

            <div class="border-t border-stone-200">
                <div class="border-b border-stone-200 py-4 flex justify-between items-center cursor-pointer hover:text-stone-500 transition group">
                    <span class="text-xs tracking-widest uppercase font-medium">How to Use It</span>
                    <span class="text-sm transition transform group-hover:translate-y-0.5">⌄</span>
                </div>
                <div class="border-b border-stone-200 py-4 flex justify-between items-center cursor-pointer hover:text-stone-500 transition group">
                    <span class="text-xs tracking-widest uppercase font-medium">Ingredients</span>
                    <span class="text-sm transition transform group-hover:translate-y-0.5">⌄</span>
                </div>
                <div class="border-b border-stone-200 py-4 flex justify-between items-center cursor-pointer hover:text-stone-500 transition group">
                    <span class="text-xs tracking-widest uppercase font-medium">Aroma</span>
                    <span class="text-sm transition transform group-hover:translate-y-0.5">⌄</span>
                </div>
                <div class="border-b border-stone-200 py-4 flex justify-between items-center cursor-pointer hover:text-stone-500 transition group">
                    <span class="text-xs tracking-widest uppercase font-medium">Reviews</span>
                    <span class="text-sm transition transform group-hover:translate-y-0.5">⌄</span>
                </div>
            </div>
        </div>

    </div>
</section>

{% endblock %}
